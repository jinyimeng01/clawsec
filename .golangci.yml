run:
  timeout: 5m

linters:
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable:
    # errcheck disabled for alpha: many CLI/error paths are intentionally fire-and-forget
    - errcheck

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
