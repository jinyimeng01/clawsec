name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build release binaries
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          LDFLAGS="-s -w -X github.com/clawsec/clawsec/internal/constants.Version=$VERSION"
          mkdir -p dist
          
          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/clawsec-linux-amd64 ./cmd/clawsec
          tar -czf dist/clawsec-${VERSION}-linux-amd64.tar.gz -C dist clawsec-linux-amd64
          
          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/clawsec-linux-arm64 ./cmd/clawsec
          tar -czf dist/clawsec-${VERSION}-linux-arm64.tar.gz -C dist clawsec-linux-arm64
          
          # macOS AMD64
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/clawsec-darwin-amd64 ./cmd/clawsec
          tar -czf dist/clawsec-${VERSION}-darwin-amd64.tar.gz -C dist clawsec-darwin-amd64
          
          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/clawsec-darwin-arm64 ./cmd/clawsec
          tar -czf dist/clawsec-${VERSION}-darwin-arm64.tar.gz -C dist clawsec-darwin-arm64
          
          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/clawsec-windows-amd64.exe ./cmd/clawsec
          zip -j dist/clawsec-${VERSION}-windows-amd64.zip dist/clawsec-windows-amd64.exe

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') }}
